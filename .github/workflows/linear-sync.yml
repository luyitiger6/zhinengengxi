name: Sync to Linear

on:
  push:
    branches:
      - main
      - 'feature/**'

jobs:
  update-linear:
    runs-on: ubuntu-latest
    steps:
      - name: Update Linear issues
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          BRANCH="${{ github.ref_name }}"
          IS_MAIN=false
          if [ "$BRANCH" = "main" ]; then
            IS_MAIN=true
          fi

          cat << 'PYEOF' > /tmp/extract_tasks.py
import json, sys, re

commits = json.load(sys.stdin)
tasks = set()

for commit in commits:
    msg = commit.get("message", "")
    matches = re.findall(r"\[PHASE(\d+)-T(\d+)\]", msg)
    for phase, task in matches:
        tasks.add((int(phase), int(task)))

task_to_xia = {}
xia_num = 32
for phase in [1, 2, 3, 4]:
    if phase == 1:
        task_range = range(1, 5)
    elif phase == 2:
        task_range = range(5, 11)
    elif phase == 3:
        task_range = range(11, 20)
    else:
        task_range = range(20, 27)

    for t in task_range:
        task_to_xia[(phase, t)] = f"XIA-{xia_num}"
        xia_num += 1

xias = [task_to_xia[(p, t)] for p, t in sorted(tasks) if (p, t) in task_to_xia]
print(",".join(xias) if xias else "NONE")
PYEOF

          TASKS=$(echo '${{ toJSON(github.event.commits) }}' | python3 /tmp/extract_tasks.py)

          if [ "$TASKS" = "NONE" ]; then
            echo "No tasks found in commits"
            exit 0
          fi

          if [ "$IS_MAIN" = "true" ]; then
            STATE_ID="56078fbe-bae1-4200-b50e-5ab1beadcc44"
            echo "Updating tasks to Done: $TASKS"
          else
            STATE_ID="da82104f-eb12-4d2a-bec8-9c4704e8c648"
            echo "Updating tasks to In Progress: $TASKS"
          fi

          for xia in $(echo "$TASKS" | tr ',' ' '); do
            echo "Updating $xia to state $STATE_ID..."
            curl -s -X POST https://api.linear.app/graphql \
              -H "Authorization: $LINEAR_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"mutation { issueUpdate(id: \\\"$xia\\\", input: {stateId: \\\"$STATE_ID\\\"}) { success } }\"}"
            echo ""
          done
