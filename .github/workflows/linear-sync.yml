name: Sync to Linear

on:
  push:
    branches:
      - main
      - 'feature/**'

jobs:
  update-linear:
    runs-on: ubuntu-latest
    steps:
      - name: Determine state and extract tasks
        id: extract
        run: |
          BRANCH="${{ github.ref_name }}"
          IS_MAIN=false
          if [ "$BRANCH" = "main" ]; then
            IS_MAIN=true
          fi
          echo "Branch: $BRANCH, Is main: $IS_MAIN"
          echo "is_main=$IS_MAIN" >> $GITHUB_OUTPUT
          echo "tasks=$(echo '${{ toJSON(github.event.commits) }}' | python3 -c '
import json, sys, re

commits = json.load(sys.stdin)
tasks = set()

for commit in commits:
    msg = commit.get("message", "")
    matches = re.findall(r"\[PHASE(\d+)-T(\d+)\]", msg)
    for phase, task in matches:
        tasks.add((int(phase), int(task)))

# Mapping from (phase, task) to Linear issue number
task_to_xia = {}
xia_num = 32
for phase in [1, 2, 3, 4]:
    if phase == 1:
        task_range = range(1, 5)
    elif phase == 2:
        task_range = range(5, 11)
    elif phase == 3:
        task_range = range(11, 20)
    else:
        task_range = range(20, 27)

    for t in task_range:
        task_to_xia[(phase, t)] = f"XIA-{xia_num}"
        xia_num += 1

xias = [task_to_xia[(p, t)] for p, t in sorted(tasks) if (p, t) in task_to_xia]
print(",".join(xias) if xias else "none")
')" >> $GITHUB_OUTPUT

      - name: Update to In Progress (feature branch)
        if: steps.extract.outputs.is_main == 'false' && steps.extract.outputs.tasks != 'none'
        run: |
          echo "Updating tasks to In Progress..."
          IFS=',' read -ra TASKS <<< "${{ steps.extract.outputs.tasks }}"
          for xia in "${TASKS[@]}"; do
            echo "Updating $xia to In Progress..."
            curl -s -X POST https://api.linear.app/graphql \
              -H "Authorization: ${{ secrets.LINEAR_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"mutation { issueUpdate(id: \\\"$xia\\\", input: {stateId: \\\"da82104f-eb12-4d2a-bec8-9c4704e8c648\\\"}) { success } }\"}"
            echo ""
          done

      - name: Update to Done (main branch)
        if: steps.extract.outputs.is_main == 'true' && steps.extract.outputs.tasks != 'none'
        run: |
          echo "Updating tasks to Done..."
          IFS=',' read -ra TASKS <<< "${{ steps.extract.outputs.tasks }}"
          for xia in "${TASKS[@]}"; do
            echo "Updating $xia to Done..."
            curl -s -X POST https://api.linear.app/graphql \
              -H "Authorization: ${{ secrets.LINEAR_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"mutation { issueUpdate(id: \\\"$xia\\\", input: {stateId: \\\"56078fbe-bae1-4200-b50e-5ab1beadcc44\\\"}) { success } }\"}"
            echo ""
          done
