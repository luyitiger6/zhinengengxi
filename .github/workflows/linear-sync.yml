name: Sync to Linear

on:
  push:
    branches:
      - main
      - 'feature/**'

jobs:
  update-linear:
    runs-on: ubuntu-latest
    steps:
      - name: Update Linear issues
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          REF="${{ github.ref_name }}"
          MSG="${{ github.event.head_commit.message }}"
          STATE_ID="56078fbe-bae1-4200-b50e-5ab1beadcc44"
          if [ "$REF" != "main" ]; then
            STATE_ID="da82104f-eb12-4d2a-bec8-9c4704e8c648"
          fi
          echo "Branch: $REF, State: $STATE_ID"
          echo "Commit message: $MSG"

          # Update all possible tasks
          for XIA in XIA-32 XIA-33 XIA-34 XIA-35 XIA-36 XIA-37 XIA-38 XIA-39 XIA-40 XIA-41 XIA-42 XIA-43 XIA-44 XIA-45 XIA-46 XIA-47 XIA-48 XIA-49 XIA-50 XIA-51 XIA-52 XIA-53 XIA-54 XIA-55 XIA-56 XIA-57; do
            NUM="${XIA#XIA-}"
            PHASE=0
            if [ "$NUM" -ge 32 ] && [ "$NUM" -le 35 ]; then PHASE=1; TASK=$((NUM-31)); fi
            if [ "$NUM" -ge 36 ] && [ "$NUM" -le 41 ]; then PHASE=2; TASK=$((NUM-35)); fi
            if [ "$NUM" -ge 42 ] && [ "$NUM" -le 50 ]; then PHASE=3; TASK=$((NUM-41)); fi
            if [ "$NUM" -ge 51 ] && [ "$NUM" -le 57 ]; then PHASE=4; TASK=$((NUM-50)); fi

            if [ "$PHASE" -gt 0 ]; then
              if echo "$MSG" | grep -q "\[PHASE${PHASE}-T${TASK}\]"; then
                echo "Updating $XIA to state $STATE_ID..."
                curl -s -X POST https://api.linear.app/graphql \
                  -H "Authorization: $LINEAR_API_KEY" \
                  -H "Content-Type: application/json" \
                  -d "{\"query\":\"mutation { issueUpdate(id: \\\"$XIA\\\", input: {stateId: \\\"$STATE_ID\\\"}) { success } }\"}"
                echo ""
              fi
            fi
          done
