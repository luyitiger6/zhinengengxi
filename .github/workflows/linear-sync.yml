name: Sync to Linear

on:
  push:
    branches:
      - main
      - 'feature/**'

jobs:
  update-linear:
    runs-on: ubuntu-latest
    steps:
      - name: Extract task IDs from commits
        id: extract
        run: |
          echo "ref=${{ github.ref_name }}"
          # Check if main branch
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "state=Done"
            echo "state_id=56078fbe-bae1-4200-b50e-5ab1beadcc44"
          else
            echo "state=In Progress"
            echo "state_id=da82104f-eb12-4d2a-bec8-9c4704e8c648"
          fi

      - name: Update XIA-32
        run: |
          echo "Checking XIA-32..."
          if echo "${{ github.event.head_commit.message }}" | grep -q "\[PHASE1-T1\]"; then
            echo "Found PHASE1-T1, updating..."
            curl -s -X POST https://api.linear.app/graphql \
              -H "Authorization: ${{ secrets.LINEAR_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d '{"query":"mutation { issueUpdate(id: \"XIA-32\", input: {stateId: \"'"${{ steps.extract.outputs.state_id }}"\"}) { success } }"}'
          fi

      - name: Update XIA-33
        run: |
          echo "Checking XIA-33..."
          if echo "${{ github.event.head_commit.message }}" | grep -q "\[PHASE1-T2\]"; then
            echo "Found PHASE1-T2, updating..."
            curl -s -X POST https://api.linear.app/graphql \
              -H "Authorization: ${{ secrets.LINEAR_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d '{"query":"mutation { issueUpdate(id: \"XIA-33\", input: {stateId: \"'"${{ steps.extract.outputs.state_id }}"\"}) { success } }"}'
          fi

      - name: Update XIA-34
        run: |
          echo "Checking XIA-34..."
          if echo "${{ github.event.head_commit.message }}" | grep -q "\[PHASE1-T3\]"; then
            echo "Found PHASE1-T3, updating..."
            curl -s -X POST https://api.linear.app/graphql \
              -H "Authorization: ${{ secrets.LINEAR_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d '{"query":"mutation { issueUpdate(id: \"XIA-34\", input: {stateId: \"'"${{ steps.extract.outputs.state_id }}"\"}) { success } }"}'
          fi

      - name: Update XIA-35
        run: |
          echo "Checking XIA-35..."
          if echo "${{ github.event.head_commit.message }}" | grep -q "\[PHASE1-T4\]"; then
            echo "Found PHASE1-T4, updating..."
            curl -s -X POST https://api.linear.app/graphql \
              -H "Authorization: ${{ secrets.LINEAR_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d '{"query":"mutation { issueUpdate(id: \"XIA-35\", input: {stateId: \"'"${{ steps.extract.outputs.state_id }}"\"}) { success } }"}'
          fi

      - name: Update XIA-36 to XIA-41
        run: |
          MSG="${{ github.event.head_commit.message }}"
          for i in $(seq 36 41); do
            if echo "$MSG" | grep -q "PHASE2-T$((i-35))"; then
              echo "Found PHASE2-T$((i-35)), updating XIA-$i..."
              curl -s -X POST https://api.linear.app/graphql \
                -H "Authorization: ${{ secrets.LINEAR_API_KEY }}" \
                -H "Content-Type: application/json" \
                -d '{"query":"mutation { issueUpdate(id: \"XIA-'"$i"'\", input: {stateId: \"'"${{ steps.extract.outputs.state_id }}"\"}) { success } }"}'
            fi
          done
